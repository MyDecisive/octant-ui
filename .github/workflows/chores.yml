name: 'CI'

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
      - run: |
          cp .env.example .env
      - run: npm install
      - run: npm run build
      # - run: npm run check
      - run: npm run lint